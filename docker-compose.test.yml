version: '3.8'

services:
  db_test:
    image: postgres:16-alpine
    container_name: pguatur_db_test
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pguatur_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
  
volumes:
  pgdata_test:
